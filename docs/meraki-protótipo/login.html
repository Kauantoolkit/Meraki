<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meraki - Login</title>
    
    <!-- Google Fonts: Inter & JetBrains Mono (para detalhes técnicos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Mock DB (Simulador) -->
    <script src="mock-db.js"></script>

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            400: '#73d491',
                            500: '#55CA7C', // Verde Principal
                            600: '#42a764', 
                        },
                        dark: {
                            bg: '#09090b',    // zinc-950
                            card: '#18181b',  // zinc-900
                            border: '#27272a',// zinc-800
                            input: '#121214',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Fundo em Grid Estilo Técnico */
        .bg-grid {
            background-size: 32px 32px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar {
            display: none;
        }
        
        input:focus ~ .icon-focus {
            color: #55CA7C;
        }

        /* Efeito de glitch/sharp no hover do botão principal */
        .btn-sharp:active {
            transform: translate(2px, 2px);
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-dark-bg bg-grid min-h-screen flex items-center justify-center p-4 sm:p-8 relative overflow-hidden antialiased text-zinc-300">

    <!-- Luz ambiente suave de fundo (Glow verde) -->
    <div class="fixed top-[10%] left-[20%] w-[40vw] h-[40vw] max-w-[500px] max-h-[500px] bg-brand-500/10 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none"></div>

    <!-- Container Principal (Sharp Card) -->
    <div class="w-full max-w-[420px] bg-dark-card/90 backdrop-blur-md border border-dark-border p-8 sm:p-10 relative z-10 shadow-2xl">
        
        <!-- Detalhes decorativos nos cantos (Sharp aesthetics) -->
        <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-brand-500"></div>
        <div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-brand-500"></div>
        <div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-brand-500"></div>
        <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-brand-500"></div>

        <!-- Logo Element -->
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="w-12 h-12 bg-dark-input border border-brand-500 flex items-center justify-center mb-4 shadow-[4px_4px_0px_rgba(85,202,124,0.2)]">
                <i data-lucide="terminal-square" class="text-brand-500 w-6 h-6" stroke-width="1.5"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white uppercase font-mono">Meraki</h1>
            <p class="text-xs text-zinc-500 mt-1 font-mono tracking-wider" id="subtitle">SYS.AUTH // COMPANY</p>
        </div>

        <!-- Seletor de Tipo de Conta (Sharp Tabs) -->
        <div class="bg-dark-input p-1 flex mb-8 relative border border-dark-border">
            <div id="tab-indicator" class="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-dark-card border border-dark-border transition-transform duration-300 ease-in-out shadow-sm"></div>
            
            <button onclick="setLoginType('company')" id="btn-company" class="flex-1 relative z-10 py-2.5 text-xs font-bold uppercase tracking-widest text-brand-500 transition-colors">
                Empresa
            </button>
            <button onclick="setLoginType('specialist')" id="btn-specialist" class="flex-1 relative z-10 py-2.5 text-xs font-bold uppercase tracking-widest text-zinc-600 transition-colors hover:text-zinc-400">
                Especialista
            </button>
        </div>

        <!-- Formulário -->
        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
            
            <!-- Email -->
            <div class="space-y-2">
                <label for="email" class="text-xs font-mono text-zinc-400 uppercase tracking-wider block">E-mail</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="mail" class="h-4 w-4 text-zinc-600 group-focus-within:text-brand-500 transition-colors icon-focus" stroke-width="1.5"></i>
                    </div>
                    <input type="email" id="email" required placeholder="admin@empresa.com" 
                        class="w-full pl-11 pr-4 py-3 bg-dark-input border border-dark-border text-sm text-zinc-200 placeholder-zinc-700 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all rounded-none">
                </div>
            </div>

            <!-- Senha -->
            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label for="password" class="text-xs font-mono text-zinc-400 uppercase tracking-wider">Senha</label>
                    <a href="password-recovery.html" class="text-xs font-mono text-brand-500 hover:text-brand-400 transition-colors">Esqueceu?</a>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="key" class="h-4 w-4 text-zinc-600 group-focus-within:text-brand-500 transition-colors icon-focus" stroke-width="1.5"></i>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full pl-11 pr-11 py-3 bg-dark-input border border-dark-border text-sm text-zinc-200 placeholder-zinc-700 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all rounded-none">
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-zinc-600 hover:text-zinc-400 outline-none">
                        <i data-lucide="eye" id="eye-icon" class="h-4 w-4" stroke-width="1.5"></i>
                    </button>
                </div>
            </div>

            <!-- Botão Submit -->
            <button type="submit" id="submit-btn" class="btn-sharp w-full bg-brand-500 text-dark-bg font-bold uppercase tracking-widest py-3.5 hover:bg-brand-400 border border-brand-500 transition-colors duration-200 flex justify-center items-center mt-6 shadow-[4px_4px_0px_rgba(85,202,124,0.2)]">
                <span>Inicializar</span>
                <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
            </button>
        </form>

        <!-- Divisor -->
        <div class="mt-8 mb-6 flex items-center justify-center relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-dark-border"></div>
            </div>
            <div class="relative px-4 bg-dark-card">
                <span class="text-[10px] font-mono tracking-widest text-zinc-600 uppercase">External Auth</span>
            </div>
        </div>

        <!-- Botões Social (Sharp) -->
        <div class="grid grid-cols-2 gap-4">
            <button type="button" class="flex items-center justify-center w-full px-4 py-2.5 bg-dark-input border border-dark-border hover:border-zinc-600 hover:bg-dark-border transition-colors duration-200 group rounded-none">
                <svg class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span class="text-xs font-bold uppercase tracking-wider text-zinc-300 group-hover:text-white transition-colors">Google</span>
            </button>
            <button type="button" class="flex items-center justify-center w-full px-4 py-2.5 bg-dark-input border border-dark-border hover:border-zinc-600 hover:bg-dark-border transition-colors duration-200 group rounded-none">
                <svg class="h-4 w-4 mr-2 grayscale group-hover:grayscale-0 transition-all duration-300" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="color: #0A66C2;">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                <span class="text-xs font-bold uppercase tracking-wider text-zinc-300 group-hover:text-white transition-colors">LinkedIn</span>
            </button>
        </div>

        <!-- Footer Link -->
        <p class="mt-8 text-center text-xs text-zinc-500 font-mono">
            SEM ACESSO? 
            <a href="signup.html" class="font-bold text-brand-500 hover:text-brand-400 transition-colors ml-1 border-b border-brand-500/30 hover:border-brand-500">SOLICITAR REGISTRO</a>
        </p>

    </div>

    <script>
        lucide.createIcons();

        let currentType = 'company';

        function setLoginType(type) {
            currentType = type;
            
            const btnCompany = document.getElementById('btn-company');
            const btnSpecialist = document.getElementById('btn-specialist');
            const indicator = document.getElementById('tab-indicator');
            const emailInput = document.getElementById('email');
            const subtitle = document.getElementById('subtitle');

            if (type === 'company') {
                indicator.style.transform = 'translateX(0)';
                btnCompany.classList.replace('text-zinc-600', 'text-brand-500');
                btnSpecialist.classList.replace('text-brand-500', 'text-zinc-600');
                
                emailInput.placeholder = 'admin@empresa.com';
                subtitle.textContent = 'SYS.AUTH // COMPANY';
            } else {
                indicator.style.transform = 'translateX(100%)';
                btnSpecialist.classList.replace('text-zinc-600', 'text-brand-500');
                btnCompany.classList.replace('text-brand-500', 'text-zinc-600');
                
                emailInput.placeholder = 'dev@especialista.com';
                subtitle.textContent = 'SYS.AUTH // SPECIALIST';
            }
        }

        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                pwdInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalHTML = btn.innerHTML;
            
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-wait');
            btn.innerHTML = `<span class="font-mono">Processando...</span>`;
            
            setTimeout(() => {
                const email = document.getElementById('email').value;
                console.log(`[MERAKI AUTH] Profile: ${currentType} | Target: ${email}`);
                
                // Integrando mockAPI
                window.mockAPI.login(currentType);

                btn.innerHTML = originalHTML;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-wait');
                lucide.createIcons();
                
                if (currentType === 'company') {
                    window.location.href = 'dashboard-empresa.html';
                } else {
                    window.location.href = 'dashboard-especialista.html';
                }
            }, 1200);
        }
    </script>
</body>
</html>
