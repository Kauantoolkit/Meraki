<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meraki - Password Recovery</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            400: '#73d491',
                            500: '#55CA7C', // Verde Principal
                            600: '#42a764', 
                        },
                        dark: {
                            bg: '#09090b',    // zinc-950
                            card: '#18181b',  // zinc-900
                            border: '#27272a',// zinc-800
                            input: '#121214',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .bg-grid {
            background-size: 32px 32px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        input:focus ~ .icon-focus {
            color: #55CA7C;
        }

        .btn-sharp:active {
            transform: translate(2px, 2px);
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-dark-bg bg-grid min-h-screen flex items-center justify-center p-4 sm:p-8 relative overflow-hidden antialiased text-zinc-300">

    <div class="fixed top-[10%] right-[10%] w-[30vw] h-[30vw] max-w-[400px] max-h-[400px] bg-red-500/10 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-[420px] bg-dark-card/90 backdrop-blur-md border border-dark-border p-8 sm:p-10 relative z-10 shadow-2xl">
        
        <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-zinc-500"></div>
        <div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-zinc-500"></div>
        <div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-zinc-500"></div>
        <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-zinc-500"></div>

        <div class="flex flex-col items-center justify-center mb-8">
            <div class="w-12 h-12 bg-dark-input border border-dark-border flex items-center justify-center mb-4">
                <i data-lucide="unlock" class="text-zinc-400 w-6 h-6" stroke-width="1.5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white uppercase font-mono text-center">Recuperação / Credenciais</h1>
            <p class="text-xs text-zinc-500 mt-2 text-center" id="subtitle">Insira o seu e-mail para inicializar o protocolo de reset de segurança.</p>
        </div>

        <!-- Formulário -->
        <form id="recoveryForm" onsubmit="handleRecovery(event)" class="space-y-4">
            
            <div class="space-y-2">
                <label for="email" class="text-xs font-mono text-zinc-400 uppercase tracking-wider block">Identificador (E-mail)</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="mail" class="h-4 w-4 text-zinc-600 group-focus-within:text-brand-500 transition-colors icon-focus" stroke-width="1.5"></i>
                    </div>
                    <input type="email" id="email" required placeholder="seu@email.com" 
                        class="w-full pl-11 pr-4 py-3 bg-dark-input border border-dark-border text-sm text-zinc-200 placeholder-zinc-700 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all rounded-none">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-sharp w-full bg-dark-input text-white font-bold uppercase tracking-widest py-3.5 hover:border-brand-500 hover:text-brand-500 border border-dark-border transition-colors duration-200 flex justify-center items-center mt-6">
                <span>Enviar OTP</span>
                <i data-lucide="send" class="w-4 h-4 ml-2"></i>
            </button>
        </form>

        <p class="mt-8 text-center text-xs text-zinc-500 font-mono">
            <i data-lucide="arrow-left" class="w-3 h-3 inline-block mr-1"></i>
            <a href="login.html" class="font-bold text-zinc-400 hover:text-white transition-colors border-b border-transparent hover:border-white">VOLTAR AO LOGIN</a>
        </p>

    </div>

    <script>
        lucide.createIcons();

        function handleRecovery(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalHTML = btn.innerHTML;
            
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-wait');
            btn.innerHTML = `<span class="font-mono">Processando Evento...</span>`;
            
            setTimeout(() => {
                alert(`Protocolo Despoletado: Um e-mail de recuperação simulado foi enviado para ${document.getElementById('email').value}. Verifique a sua caixa postal (Mock).`);
                window.location.href = 'login.html';
            }, 1200);
        }
    </script>
</body>
</html>
