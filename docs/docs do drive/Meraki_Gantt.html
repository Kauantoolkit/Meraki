<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meraki — Cronograma Gantt</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f7; color: #1a1a2e; }

  .header { background: #1a1a2e; color: #fff; padding: 18px 28px; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 12px; color: #aab; margin-top: 4px; }

  .legend { display: flex; gap: 18px; padding: 10px 28px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; }

  .gantt-wrap { overflow-x: auto; padding: 16px 0; }
  table { border-collapse: collapse; min-width: 1100px; width: 100%; background: #fff; }

  .col-num    { width: 36px; }
  .col-task   { width: 220px; }
  .col-resp   { width: 90px; }
  .col-status { width: 86px; }

  thead th { background: #16213e; color: #fff; font-size: 11px; padding: 8px 6px; text-align: center; white-space: nowrap; border-right: 1px solid #2a3a5e; position: sticky; top: 0; z-index: 10; }
  thead th.month-header { background: #0f3460; font-size: 10px; letter-spacing: .5px; text-transform: uppercase; }

  tbody tr:nth-child(even) td { background: #f8f9fc; }
  tbody tr:hover td { background: #eef2ff; }

  td { font-size: 11px; padding: 5px 8px; border-bottom: 1px solid #e8eaee; border-right: 1px solid #e8eaee; vertical-align: middle; }
  td.num { text-align: center; font-weight: 700; color: #533483; }
  td.task-name { font-weight: 600; color: #1a1a2e; }
  td.resp { text-align: center; }
  td.status-cell { text-align: center; }

  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .s-concluida  { background: #c8e6c9; color: #1b5e20; }
  .s-atrasada   { background: #ffcdd2; color: #b71c1c; }
  .s-ainiciar   { background: #e3f2fd; color: #0d47a1; }
  .s-andamento  { background: #fff9c4; color: #f57f17; }

  .fase-row td { background: #533483 !important; color: #fff !important; font-weight: 700; font-size: 11px; padding: 5px 10px; }

  /* Gantt bars */
  .bar-cell { padding: 4px 3px; min-width: 18px; }
  .bar { height: 16px; border-radius: 3px; position: relative; }
  .bar-concluida { background: #4caf50; }
  .bar-atrasada  { background: #ef5350; }
  .bar-ainiciar  { background: #42a5f5; opacity: 0.7; }
  .bar-andamento { background: #ffa726; }
  .bar-empty     { background: transparent; }
  .today-line    { border-left: 2px dashed #e91e63; height: 100%; position: absolute; top: 0; }

  .week-num { width: 18px; text-align: center; font-size: 9px; color: #888; padding: 2px 1px; }
  .week-today { background: #fce4ec !important; }

  footer { text-align: center; padding: 12px; font-size: 11px; color: #888; border-top: 1px solid #e0e0e0; background: #fff; }
</style>
</head>
<body>

<div class="header">
  <h1>MERAKI — Cronograma Gantt</h1>
  <p>Plano de Ação v2.0 &nbsp;|&nbsp; Período: 02/03/2026 – 26/06/2026 &nbsp;|&nbsp; Equipe: Kauan · Kaio · Joás · Tales</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div> Concluída</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div> Atrasada</div>
  <div class="legend-item"><div class="legend-dot" style="background:#42a5f5"></div> A Iniciar</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffa726"></div> Em Andamento</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e91e63; border-radius:0; width:3px; height:14px;"></div> Hoje</div>
</div>

<div class="gantt-wrap">
<table id="gantt"></table>
</div>

<footer>Gerado automaticamente com base no DRS Meraki v1.0 &nbsp;|&nbsp; Atualizado em: <span id="today-str"></span></footer>

<script>
const tasks = [
  // FASE 1 – PLANEJAMENTO
  { fase:"1 – Planejamento",         num:"T1",   nome:"Definição da Proposta",                        resp:"Todos",          ini:"2026-03-02", fim:"2026-03-08", status:"CONCLUÍDA" },
  { fase:"1 – Planejamento",         num:"T2",   nome:"DRS v1.0 — Documentação Inicial",              resp:"Todos",          ini:"2026-03-02", fim:"2026-03-08", status:"CONCLUÍDA" },
  { fase:"1 – Planejamento",         num:"T3",   nome:"Levantamento de Requisitos",                   resp:"Todos",          ini:"2026-03-02", fim:"2026-03-08", status:"CONCLUÍDA" },
  // FASE 2 – MODELAGEM
  { fase:"2 – Modelagem",            num:"T4",   nome:"Modelagem UML e DDD",                          resp:"Todos",          ini:"2026-03-09", fim:"2026-03-15", status:"ATRASADA"  },
  { fase:"2 – Modelagem",            num:"T5a",  nome:"Prototipação de Telas (UI/UX)",                resp:"Joás/Tales",     ini:"2026-03-16", fim:"2026-03-29", status:"A INICIAR" },
  { fase:"2 – Modelagem",            num:"T5b",  nome:"Design de Contratos de API",                   resp:"Kauan/Kaio",     ini:"2026-03-16", fim:"2026-03-29", status:"A INICIAR" },
  // FASE 3 – INFRAESTRUTURA
  { fase:"3 – Infraestrutura",       num:"T6",   nome:"Setup Infra & Microserviços (Docker, RabbitMQ)", resp:"Todos",        ini:"2026-03-30", fim:"2026-04-05", status:"A INICIAR" },
  // FASE 4 – BACKEND CORE (pares paralelos)
  { fase:"4 – Backend Core",         num:"T7a",  nome:"user-service (Identity & Access)",             resp:"Joás/Kaio",      ini:"2026-04-06", fim:"2026-04-19", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T7b",  nome:"project-service — Início",                     resp:"Kauan/Tales",    ini:"2026-04-06", fim:"2026-04-19", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T8a",  nome:"project-service — Conclusão",                  resp:"Kauan/Tales",    ini:"2026-04-20", fim:"2026-05-03", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T8b",  nome:"bidding-service — Início",                     resp:"Joás/Kaio",      ini:"2026-04-20", fim:"2026-05-03", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T9a",  nome:"bidding-service — Conclusão",                  resp:"Tales/Kaio",     ini:"2026-05-04", fim:"2026-05-17", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T9b",  nome:"delivery-service — Início",                    resp:"Kauan/Joás",     ini:"2026-05-04", fim:"2026-05-17", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T10a", nome:"delivery-service — Conclusão",                 resp:"Kauan/Joás",     ini:"2026-05-18", fim:"2026-05-31", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T10b", nome:"payment-service — Início",                     resp:"Tales/Kaio",     ini:"2026-05-18", fim:"2026-05-31", status:"A INICIAR" },
  { fase:"4 – Backend Core",         num:"T11",  nome:"payment-service — Conclusão",                  resp:"Tales/Kaio",     ini:"2026-06-01", fim:"2026-06-14", status:"A INICIAR" },
  // FASE 5 – FRONTEND + PORTFOLIO
  { fase:"5 – Frontend+Portfolio",   num:"T12a", nome:"App Flutter (Mobile MVVM)",                    resp:"Joás/Tales",     ini:"2026-05-18", fim:"2026-06-14", status:"A INICIAR" },
  { fase:"5 – Frontend+Portfolio",   num:"T12b", nome:"portfolio-service",                            resp:"Kauan/Joás",     ini:"2026-06-01", fim:"2026-06-14", status:"A INICIAR" },
  // FASE 6 – QA & ENTREGA
  { fase:"6 – QA & Entrega",         num:"T13",  nome:"Testes Integrados & Bug Fix",                  resp:"Todos",          ini:"2026-06-15", fim:"2026-06-21", status:"A INICIAR" },
  { fase:"6 – QA & Entrega",         num:"T14",  nome:"Preparação Apresentação Final",                resp:"Todos",          ini:"2026-06-22", fim:"2026-06-25", status:"A INICIAR" },
  { fase:"6 – QA & Entrega",         num:"T15",  nome:"Apresentação Final (Banca)",                   resp:"Todos",          ini:"2026-06-26", fim:"2026-06-26", status:"A INICIAR" },
];

const projectStart = new Date("2026-03-02");
const projectEnd   = new Date("2026-06-26");
const today        = new Date("2026-03-18");

document.getElementById("today-str").textContent = today.toLocaleDateString("pt-BR");

// Build weeks array
const weeks = [];
let cur = new Date(projectStart);
while (cur <= projectEnd) {
  weeks.push(new Date(cur));
  cur.setDate(cur.getDate() + 7);
}
const totalWeeks = weeks.length;

function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}
function weekIndex(d) {
  return Math.floor(daysBetween(projectStart, d) / 7);
}

// Build month groups for header
const months = {};
weeks.forEach((w, i) => {
  const key = w.toLocaleDateString("pt-BR", { month: "short", year: "2-digit" });
  if (!months[key]) months[key] = { start: i, count: 0 };
  months[key].count++;
});

const table = document.getElementById("gantt");

// Header rows
const thead = table.createTHead();

// Row 1: month labels
const r0 = thead.insertRow();
["#","Tarefa","Resp.","Status"].forEach(h => {
  const th = document.createElement("th");
  th.textContent = h;
  th.rowSpan = 2;
  r0.appendChild(th);
});
Object.entries(months).forEach(([label, {count}]) => {
  const th = document.createElement("th");
  th.textContent = label.toUpperCase();
  th.colSpan = count;
  th.className = "month-header";
  r0.appendChild(th);
});

// Row 2: week numbers
const r1 = thead.insertRow();
weeks.forEach((w, i) => {
  const th = document.createElement("th");
  th.className = "week-num";
  const isToday = w <= today && today < new Date(w.getTime() + 7*86400000);
  if (isToday) th.classList.add("week-today");
  th.textContent = "S" + (i+1);
  r1.appendChild(th);
});

// Body
const tbody = table.createTBody();
let lastFase = "";
tasks.forEach(t => {
  if (t.fase !== lastFase) {
    const fr = tbody.insertRow();
    fr.className = "fase-row";
    const td = fr.insertCell();
    td.colSpan = 4 + totalWeeks;
    td.textContent = "  " + t.fase.toUpperCase();
    lastFase = t.fase;
  }

  const row = tbody.insertRow();
  // num
  const tdN = row.insertCell(); tdN.className = "num"; tdN.textContent = t.num;
  // name
  const tdT = row.insertCell(); tdT.className = "task-name"; tdT.textContent = t.nome;
  // resp
  const tdR = row.insertCell(); tdR.className = "resp"; tdR.textContent = t.resp;
  // status
  const tdS = row.insertCell(); tdS.className = "status-cell";
  const badge = document.createElement("span");
  badge.className = "status-badge " + {
    "CONCLUÍDA":"s-concluida","ATRASADA":"s-atrasada","A INICIAR":"s-ainiciar","EM ANDAMENTO":"s-andamento"
  }[t.status];
  badge.textContent = t.status;
  tdS.appendChild(badge);

  // Gantt cells
  const ini = new Date(t.ini);
  const fim = new Date(t.fim);
  const startW = weekIndex(ini);
  const endW   = Math.min(weekIndex(fim) + 1, totalWeeks - 1);
  const barClass = {
    "CONCLUÍDA":"bar-concluida","ATRASADA":"bar-atrasada","A INICIAR":"bar-ainiciar","EM ANDAMENTO":"bar-andamento"
  }[t.status] || "bar-ainiciar";

  weeks.forEach((w, i) => {
    const td = row.insertCell();
    td.className = "bar-cell";
    const isToday = w <= today && today < new Date(w.getTime() + 7*86400000);
    if (isToday) td.style.background = "#fce4ec22";
    if (i >= startW && i <= endW) {
      const bar = document.createElement("div");
      bar.className = "bar " + barClass;
      // Add today marker
      if (isToday) {
        const tl = document.createElement("div");
        tl.className = "today-line";
        bar.appendChild(tl);
      }
      td.appendChild(bar);
    }
  });
});
</script>
</body>
</html>
