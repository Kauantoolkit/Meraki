# ─── bidding-service — deploy independente ─────────────────────────────────
# Sobe o serviço + seu PostgreSQL próprio.
# RabbitMQ é externo: configure RABBITMQ_URL no .env apontando para o servidor
# de infra (ver backend/docker-compose.infra.yml).
#
# Uso:
#   cp .env.example .env   # preencha os valores
#   docker compose up -d

services:
  bidding-service:
    build: .
    container_name: meraki-bidding-service
    ports:
      - '${PORT:-3003}:${PORT:-3003}'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3003}
      DB_HOST: bidding-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bidding_db}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      bidding-db:
        condition: service_healthy
    restart: unless-stopped

  bidding-db:
    image: postgres:15-alpine
    container_name: meraki-bidding-db
    environment:
      POSTGRES_DB: ${DB_NAME:-bidding_db}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db-data:
