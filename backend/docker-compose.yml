version: '3.8'

services:
  # ─── IDENTITY SERVICE DB ───────────────────────────────────────────────────
  identity-db:
    image: postgres:15-alpine
    container_name: meraki-identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - identity-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PROJECT SERVICE DB ────────────────────────────────────────────────────
  project-db:
    image: postgres:15-alpine
    container_name: meraki-project-db
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - project-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BIDDING SERVICE DB ────────────────────────────────────────────────────
  bidding-db:
    image: postgres:15-alpine
    container_name: meraki-bidding-db
    environment:
      POSTGRES_DB: bidding_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - bidding-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── DELIVERY SERVICE DB ───────────────────────────────────────────────────
  delivery-db:
    image: postgres:15-alpine
    container_name: meraki-delivery-db
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - delivery-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PAYMENT SERVICE DB ────────────────────────────────────────────────────
  payment-db:
    image: postgres:15-alpine
    container_name: meraki-payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5436:5432'
    volumes:
      - payment-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PORTFOLIO SERVICE DB ──────────────────────────────────────────────────
  portfolio-db:
    image: postgres:15-alpine
    container_name: meraki-portfolio-db
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5437:5432'
    volumes:
      - portfolio-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RABBITMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: meraki-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: meraki
      RABBITMQ_DEFAULT_PASS: meraki
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # Management UI
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SERVIÇOS ──────────────────────────────────────────────────────────────

  identity-service:
    build: ./identity-service
    container_name: meraki-identity-service
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DB_HOST: identity-db
      DB_PORT: 5432
      DB_NAME: identity_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: meraki-jwt-secret
      JWT_EXPIRES_IN: 7d
      RABBITMQ_URL: amqp://meraki:meraki@rabbitmq:5672
    depends_on:
      identity-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: meraki-api-gateway
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      JWT_SECRET: meraki-jwt-secret
      IDENTITY_SERVICE_URL: http://identity-service:3001
      PROJECT_SERVICE_URL: http://project-service:3002
      BIDDING_SERVICE_URL: http://bidding-service:3003
      DELIVERY_SERVICE_URL: http://delivery-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      PORTFOLIO_SERVICE_URL: http://portfolio-service:3006
    depends_on:
      - identity-service

  project-service:
    build: ./project-service
    container_name: meraki-project-service
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      DB_HOST: project-db
      DB_PORT: 5432
      DB_NAME: project_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: meraki-jwt-secret
      RABBITMQ_URL: amqp://meraki:meraki@rabbitmq:5672
    depends_on:
      project-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  bidding-service:
    build: ./bidding-service
    container_name: meraki-bidding-service
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      DB_HOST: bidding-db
      DB_PORT: 5432
      DB_NAME: bidding_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: meraki-jwt-secret
      RABBITMQ_URL: amqp://meraki:meraki@rabbitmq:5672
    depends_on:
      bidding-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  delivery-service:
    build: ./delivery-service
    container_name: meraki-delivery-service
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      DB_HOST: delivery-db
      DB_PORT: 5432
      DB_NAME: delivery_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: meraki-jwt-secret
      RABBITMQ_URL: amqp://meraki:meraki@rabbitmq:5672
    depends_on:
      delivery-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    container_name: meraki-payment-service
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: meraki-jwt-secret
      RABBITMQ_URL: amqp://meraki:meraki@rabbitmq:5672
      PLATFORM_FEE_RATE: '0.10'
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  portfolio-service:
    build: ./portfolio-service
    container_name: meraki-portfolio-service
    ports:
      - '3006:3006'
    environment:
      PORT: 3006
      DB_HOST: portfolio-db
      DB_PORT: 5432
      DB_NAME: portfolio_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: meraki-jwt-secret
      RABBITMQ_URL: amqp://meraki:meraki@rabbitmq:5672
    depends_on:
      portfolio-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  identity-db:
  project-db:
  bidding-db:
  delivery-db:
  payment-db:
  portfolio-db:
  rabbitmq:
